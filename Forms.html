<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<h1>Registration Form</h1>
<body>
<form action="">
    <label for="First Name">First Name:</label>
    <input type="text" name="First Name" id="" placeholder="Enter your first name" required>
    <br>
<label for="Last Name">Last Name:</label>
    <input type="text" name="Last Name" id="" placeholder="Enter your last name" required>
    <br>
    <label for="E-mail">E-mail:</label>
    <input type="email" name="E-mail" id="" placeholder="Enter e-mail address" required>
    <br>
    <label for="Password">Password:</label>
    <input type="password" name="Password" id="">
    <br>
    <label for="Gender">Gender:</label>
    <br>
    <input type="radio" name="Gender" id="" value="M">Male
    <br>
    <input type="radio" name="Gender" id="" value="F">Female
<br>
<input type="radio" name="Gender" id="" value="Other">other
<br>
<label for="Age">Age:</label>
<input type="number" name="Age" id="" min="o" max="100" required>
<br>
<label for="Preferences">Prefrences:</label>
<br>
<label for="">Acyrlic painting</label>
<input type="checkbox" name="" id="">
<br>
<label for="">Oil painting</label>
<input type="checkbox" name="" id="">
<br>
<label for="">Water color painting</label>
<input type="checkbox" name="" id="">
<br>
<label for="Select Occupation">Select Occupation</label>
<select name="Select Occupation" id="">
    <option value="Student">Student</option>
    <option value="Teacher">Teacher</option>
    <option value="Principal">Principal</option>
    <option value="Guard">Guard</option>
</select>
<br>
<label for="Bio">Bio</label>
<textarea name="Bio" id="" cols="40px" rows="5px" placeholder="Share few lines about yourself..." required></textarea>
<br>  
<input type="reset" value="Reset">
    <input type="Submit" value="Submit">









</form>
    
</body>
</html>
